<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dagplanning</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Nieuw: Cyber Logo Header bovenaan de app -->
        <header class="brand-header">
            <div class="logo-wrapper">
                <img src="topvakantie-logo.png" alt="Topvakantie Logo" class="logo-img">
            </div>
        </header>

        <!-- Live Status Card -->
        <div class="live-card">
            <div id="currentTime">00:00:00</div>
            <div class="current-status-label">Nu bezig met</div>
            <div id="currentActivity">Geen activiteit</div>
            <div class="current-time-range">
                <span id="currentActivityFrom">00:00</span> - <span id="currentActivityTo">00:00</span>
            </div>
        </div>

        <!-- Planning Tabel Container -->
        <div class="schedule-container">
            <table class="schedule-table" id="schedule-table">
                <tbody>
                    <!-- Wordt dynamisch ingeladen via script.js -->
                </tbody>
            </table>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
