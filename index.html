<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Topvakantie Hub</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Cyber Logo Header -->
        <header class="brand-header">
            <div class="logo-wrapper">
                <img src="topvakantie-logo2.png" alt="Topvakantie Logo" class="logo-img">
            </div>
        </header>

        <!-- ================= HOOFDSCHERM ================= -->
        <section id="main-menu" class="screen-section active-screen">
            <div class="welcome-card">
                <p>Klik op een van de opties hieronder:</p>
            </div>
            
            <div class="menu-grid">
                <button class="cyber-btn" onclick="switchScreen('planning-screen')">
                    <span class="btn-icon">📅</span>
                    <span class="btn-text">Dagplanning</span>
                </button>

                <button class="cyber-btn" onclick="switchScreen('animatoren-screen')">
                    <span class="btn-icon">😎</span>
                    <span class="btn-text">Wie zijn de animatoren?</span>
                </button>

                <button class="cyber-btn" onclick="switchScreen('regels-screen')">
                    <span class="btn-icon">📜</span>
                    <span class="btn-text">Regels van de week</span>
                </button>

                <!-- Nieuwe Knop naar Waar zijn we -->
                <button class="cyber-btn" onclick="switchScreen('locatie-screen')">
                    <span class="btn-icon">📍</span>
                    <span class="btn-text">Waar zijn we?</span>
                </button>
                
                <button class="cyber-btn disabled" disabled>
                    <span class="btn-icon">🎮</span>
                    <span class="btn-text">Game (Coming Soon)</span>
                </button>
            </div>
        </section>

        <!-- ================= PLANNING SCHERM ================= -->
        <section id="planning-screen" class="screen-section">
            <button class="back-btn" onclick="switchScreen('main-menu')">← Terug naar Hub</button>

            <div class="live-card">
                <div id="currentTime">00:00:00</div>
                <div class="current-status-label">Nu bezig met</div>
                <div id="currentActivity">Geen activiteit</div>
                <div class="current-time-range">
                    <span id="currentActivityFrom">00:00</span> - <span id="currentActivityTo">00:00</span>
                </div>
            </div>

            <div class="schedule-container">
                <table class="schedule-table" id="schedule-table">
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- ================= ANIMATOREN SCHERM ================= -->
        <section id="animatoren-screen" class="screen-section">
            <button class="back-btn" onclick="switchScreen('main-menu')">← Terug naar Hub</button>

            <div class="animatoren-container">
                <div class="animator-card">
                    <div class="animator-photo-wrapper">
                        <img src="animator1.jpg" alt="Animator" class="animator-photo">
                    </div>
                    <div class="animator-info">
                        <div class="info-row"><span class="info-label">Naam:</span> <span class="info-value">Tom</span></div>
                        <div class="info-row"><span class="info-label">Functie:</span> <span class="info-value">Hoofdanimator</span></div>
                        <div class="info-row"><span class="info-label">Skill:</span> <span class="info-value">Gitaar bij het kampvuur 🔥</span></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= REGELS SCHERM ================= -->
        <section id="regels-screen" class="screen-section">
            <button class="back-btn" onclick="switchScreen('main-menu')">← Terug naar Hub</button>

            <div class="regels-container">
                <div class="regel-card">
                    <div class="regel-number">01</div>
                    <div class="regel-text">Respecteer de rust na het lichten uitdoen (22:30).</div>
                </div>
            </div>
        </section>

       <!-- ================= LOCATIE SCHERM ================= -->
        <section id="locatie-screen" class="screen-section">
            <button class="back-btn" onclick="switchScreen('main-menu')">← Terug naar Hub</button>

            <div class="maps-container">
                <!-- Google Maps gelinkt naar Hotelschool Ter Duinen -->
                <iframe 
                    class="google-maps-iframe"
                    src="https://maps.google.com/maps?q=Hotelschool%20Ter%20Duinen,%20Houtsaegerlaan%2040,%208670%20Koksijde&t=&z=15&ie=UTF8&iwloc=&output=embed" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
                
                <div class="address-card">
                    <span class="address-icon">🏢</span>
                    <div class="address-text">
                        <strong>Hotelschool Ter Duinen</strong><br>
                        Houtsaegerlaan 40, 8670 Koksijde
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
